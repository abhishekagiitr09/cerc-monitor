name: CERC Monitor

on:
  schedule:
    - cron: "30 9,15,18 * * *"   # 3 times daily (IST adjusted)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Script
        run: python cerc_monitor.py
